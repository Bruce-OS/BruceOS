# BruceOS CI — Lint, ShellCheck, and ISO Build
#
# The ISO build runs directly on ubuntu-latest using mock to create
# a Fedora 43 buildroot with proper loop device access. This avoids
# the container-in-container issues with livemedia-creator.

name: BruceOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Validate kickstart syntax ──────────────────────────
  lint:
    name: Kickstart Lint
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install pykickstart
        run: dnf install -y pykickstart

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate kickstart files
        run: |
          exit_code=0
          for ks in kickstart/*.ks; do
            echo "--- Validating ${ks}"
            if ! ksvalidator "${ks}"; then
              echo "FAIL: ${ks}"
              exit_code=1
            fi
          done
          exit "${exit_code}"

  # ── Job 2: ShellCheck all shell scripts ───────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all .sh files
        run: |
          shfiles=$(find . -name '*.sh' -type f)
          if [ -z "${shfiles}" ]; then
            echo "No .sh files found, skipping."
            exit 0
          fi
          echo "Checking: ${shfiles}"
          echo "${shfiles}" | xargs shellcheck --severity=warning

  # ── Job 3: Build the live ISO ─────────────────────────────────
  # livemedia-creator --no-virt needs loop devices and chroot,
  # which don't work inside nested containers. We run on the
  # host with sudo instead.
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    needs: [lint, shellcheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Install Fedora tools via Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build ISO
        run: |
          # Create a Fedora 43 rootfs with build tools, then run
          # livemedia-creator on the host (with real /dev/loop access)
          sudo podman run --rm --privileged \
            --pid=host \
            --device /dev/loop-control:/dev/loop-control \
            $(for d in /dev/loop*; do echo -n "--device $d:$d "; done) \
            -v "$(pwd):/build:Z" \
            -v /dev:/dev \
            fedora:43 \
            bash /build/iso/build.sh bruceos-base.ks

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: BruceOS-ISO
          path: output/BruceOS-*.iso
          if-no-files-found: error
          retention-days: 14
