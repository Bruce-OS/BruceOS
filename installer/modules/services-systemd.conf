# BruceOS — Calamares Services Module
# Enable/disable systemd services on the installed system

services:
    - name: "NetworkManager"
      mandatory: true
    - name: "gdm"
      mandatory: true
    - name: "firewalld"
      mandatory: false
    - name: "sshd"
      mandatory: false
    - name: "bruceos-first-boot"
      mandatory: false

targets:
    - name: "graphical"
      mandatory: true
