# BruceOS — Calamares Welcome Module

requirements:
    requiredStorage:    8.0
    requiredRam:        2.0
    check:
        - storage
        - ram
    required:
        - ram
    # NOTE: storage and partitions checks removed from "required" —
    # KPMCore device scan can deadlock, and the partition page handles
    # its own detection. Don't block the welcome screen.

showSupportUrl:     true
showKnownIssuesUrl: true
showReleaseNotesUrl: true
showDonateUrl:      false
