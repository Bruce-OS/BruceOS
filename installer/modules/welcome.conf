# BruceOS — Calamares Welcome Module

requirements:
    requiredStorage:    16.0
    requiredRam:        2.0
    check:
        - storage
        - ram
        - root
    required:
        - storage
        - ram
        - root
    # NOTE: "partitions" deliberately excluded from check — KPMCore device scan
    # deadlocks on some VMs with virtio-blk. The partition module handles its
    # own scanning when you navigate to the partitions page.

showSupportUrl:     true
showKnownIssuesUrl: true
showReleaseNotesUrl: true
showDonateUrl:      false
