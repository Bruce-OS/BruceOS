# BruceOS — Calamares Welcome Module
# Checks system requirements before installation

requirements:
    requiredStorage:    16.0
    requiredRam:        2.0
    internetCheckUrl:   https://bruceos.com
    check:
        - storage
        - ram
        - root
    required:
        - storage
        - ram
        - root

# Language selection on the welcome page
showSupportUrl:     true
showKnownIssuesUrl: true
showReleaseNotesUrl: true
showDonateUrl:      false
