# BruceOS — Post-install shell commands
# Runs inside chroot after all modules complete

dontChroot: false
timeout: 300

script:
    # Set Fish as default shell for ALL existing users
    - command: "/bin/bash -c 'for user in $(awk -F: \"\\$3 >= 1000 && \\$3 < 65534 {print \\$1}\" /etc/passwd); do chsh -s /usr/bin/fish $user 2>/dev/null; done; chsh -s /usr/bin/fish root 2>/dev/null; sed -i \"s|^SHELL=.*|SHELL=/usr/bin/fish|\" /etc/default/useradd || true'"
      timeout: 15
    # Rebuild dracut for CachyOS kernel
    - command: "/bin/bash -c 'KVER=$(rpm -q --qf \"%{VERSION}-%{RELEASE}.%{ARCH}\" kernel-cachyos 2>/dev/null | head -1) && [ -n \"$KVER\" ] && dracut --force /boot/initramfs-${KVER}.img ${KVER} || true'"
      timeout: 120
    # Remove live user artifacts
    - command: "rm -f /etc/sudoers.d/liveuser"
      timeout: 5
    # Remove installer from autostart and applications
    - command: "/bin/bash -c 'rm -f /home/*/.config/autostart/bruceos-install.desktop; rm -f /usr/share/applications/install-bruceos.desktop; rm -f /home/*/Desktop/install-bruceos.desktop'"
      timeout: 5
    # Set the real dock with apps (replaces installer-only dock)
    - command: "/bin/bash -c \"mkdir -p /etc/dconf/db/local.d && cat > /etc/dconf/db/local.d/02-bruceos-installed << DEOF\n[org/gnome/shell]\nfavorite-apps=['org.gnome.Nautilus.desktop', 'com.mitchellh.ghostty.desktop', 'chrome.desktop', 'firefox.desktop', 'org.gnome.Software.desktop']\n\n[org/gnome/shell/extensions/dash-to-dock]\nshow-trash=true\nshow-mounts=true\nshow-show-apps-button=true\nshow-running=true\nDEOF\ndconf update || true\""
      timeout: 10
    # NVIDIA driver setup (only if NVIDIA GPU detected)
    - command: "/bin/bash -c 'if lspci | grep -qi nvidia; then echo \"NVIDIA GPU detected — drivers pre-installed\"; fi'"
      timeout: 10
    # Update GRUB config
    - command: "grub2-mkconfig -o /boot/grub2/grub.cfg 2>/dev/null || true"
      timeout: 60
