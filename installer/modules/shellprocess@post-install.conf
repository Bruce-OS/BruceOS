# BruceOS — Post-install shell commands
# Runs inside chroot after all modules complete

dontChroot: false
timeout: 120

script:
    # Set Fish as default shell for new users
    - command: "sed -i 's|^SHELL=.*|SHELL=/usr/bin/fish|' /etc/default/useradd"
      timeout: 10
    # Rebuild dracut for CachyOS kernel
    - command: "/bin/bash -c 'KVER=$(rpm -q --qf \"%{VERSION}-%{RELEASE}.%{ARCH}\" kernel-cachyos 2>/dev/null | head -1) && [ -n \"$KVER\" ] && dracut --force /boot/initramfs-${KVER}.img ${KVER} || true'"
      timeout: 120
    # Remove live user artifacts
    - command: "rm -f /etc/sudoers.d/liveuser"
      timeout: 5
    # Remove installer autostart
    - command: "rm -f /home/*/.config/autostart/bruceos-install.desktop"
      timeout: 5
    # Set the real dock (apps, trash, show-apps button, running apps visible)
    - command: "/bin/bash -c \"mkdir -p /etc/dconf/db/local.d && cat > /etc/dconf/db/local.d/02-bruceos-dock << DOCKEOF\n[org/gnome/shell]\nfavorite-apps=['org.gnome.Nautilus.desktop', 'ghostty.desktop', 'chrome.desktop', 'firefox.desktop', 'org.gnome.Software.desktop']\n[org/gnome/shell/extensions/dash-to-dock]\nshow-trash=true\nshow-mounts=true\nshow-show-apps-button=true\nshow-running=true\nDOCKEOF\ndconf update || true\""
      timeout: 10
    # Update GRUB config
    - command: "grub2-mkconfig -o /boot/grub2/grub.cfg 2>/dev/null || true"
      timeout: 60
