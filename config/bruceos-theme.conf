# BruceOS Accent Color Configuration
# Change H/S/L values and run: sudo bruceos-theme-apply --full
#
# HSL is the single source of truth. All hex colors are generated from it.
#   H = Hue (0-360)        e.g. 160=emerald, 0=red, 220=blue, 270=purple
#   S = Saturation (0-100)  e.g. 100=vivid, 50=muted, 0=grey
#   L = Lightness (0-100)   e.g. 50=normal, 70=light, 30=dark
#
# Presets:
#   Emerald:  H=160 S=84 L=39
#   Red:      H=0   S=84 L=60
#   Blue:     H=217 S=91 L=60
#   Purple:   H=263 S=90 L=66
#   Orange:   H=25  S=95 L=53
#   Pink:     H=330 S=81 L=60
#   Teal:     H=173 S=80 L=40
#
# GNOME_ACCENT must be one of: blue, teal, green, yellow, orange, red, pink, purple, slate

ACCENT_HUE=160
ACCENT_SAT=84
ACCENT_LIT=39
GNOME_ACCENT=green
